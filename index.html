<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycling Mauri</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="hero">

    <div class="hero-text">
        <h1>Cycling Mauri</h1>
        <p>Temporada 2026</p>
        <span class="subtitol">
            Seguiment de la temporada d'en Mauri
        </span>
    </div>

</header>

<nav class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Curses</a>
    <a href="#">Entrenaments</a>
    <a href="#">Estadístiques</a>
</nav>

<section class="cards">

    <div class="card">
        <h3>Curses</h3>
        <h2 id="curses">0</h2>
    </div>

    <div class="card">
        <h3>Millor resultat</h3>
        <h2 id="millor">0</h2>
    </div>

    <div class="card">
        <h3>Top 10</h3>
        <h2 id="top10">0</h2>
    </div>

    <div class="card">
        <h3>Mitjana</h3>
        <h2 id="mitjana">0</h2>
    </div>

</section>

<section class="grafics">

    <div class="grafica">
        <h2>Evolució</h2>
        <canvas id="evolucio"></canvas>
    </div>

    <div class="grafica">
        <h2>Nivells</h2>
        <canvas id="nivells"></canvas>
    </div>

</section>

<section class="grafics">

    <div class="grafica">
        <h2>Copa Catalana</h2>
        <canvas id="copaCatalana"></canvas>
    </div>

</section>

<section class="grafica curses">

    <h2>🏁 Curses</h2>

    <table id="taula-curses">

        <thead>
            <tr>
                <th>Data</th>
                <th>Cursa</th>
                <th>Posició</th>
                <th>Nivell</th>
            </tr>
        </thead>

        <tbody>

        </tbody>

    </table>

</section>

<script src="script.js"></script>

</body>
</html>
