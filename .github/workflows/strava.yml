name: Actualitzar entrenaments Strava

on:
  workflow_dispatch:

jobs:
  strava:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositori
        uses: actions/checkout@v4

      - name: Comprovar secrets
        run: |
          echo "Client ID: $STRAVA_CLIENT_ID"

          if [ -z "$STRAVA_CLIENT_SECRET" ]; then
            echo "ERROR: falta STRAVA_CLIENT_SECRET"
            exit 1
          fi

          if [ -z "$STRAVA_REFRESH_TOKEN" ]; then
            echo "ERROR: falta STRAVA_REFRESH_TOKEN"
            exit 1
          fi

          echo "Secrets correctes ✅"

        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}